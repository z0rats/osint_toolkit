name: corvid-prod

# Used by the one-line installer (install.sh) and manual GHCR-based deploys.
# Pulls pre-built images instead of building from source - see
# docker-compose.yaml for the build-from-source version used by contributors.
#
# Named as a separate Compose project (corvid-prod vs corvid) and without
# container_name overrides, so this can run alongside a local docker-compose.yaml
# dev stack on the same host without container/network name clashes. If both
# run at once, set FRONTEND_PORT for one of them to avoid a port clash on 4000.
services:
  backend:
    networks:
      - corvid-network
    image: ghcr.io/z0rats/corvid-backend:latest
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/backend/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/healthcheck', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    networks:
        - corvid-network
    image: ghcr.io/z0rats/corvid-frontend:latest
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-4000}:80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  corvid-network:
    driver: bridge
